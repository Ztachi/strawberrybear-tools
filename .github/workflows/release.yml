name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run changeset version
        id: changeset
        run: |
          echo "Running changeset version..."
          pnpm ci:version
          CHANGESET_SUMMARY=$(git status --porcelain)
          echo "Changeset summary: $CHANGESET_SUMMARY"
          if [ -n "$CHANGESET_SUMMARY" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit version bump
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          echo "Committing version bump..."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: version bump"
          git push

      - name: Get changed packages and versions
        if: steps.changeset.outputs.has_changes == 'true'
        id: versions
        run: |
          echo "Extracting versions..."
          # Get list of changed package.json files and extract versions
          for pkg in $(git diff HEAD~1 --name-only -- 'apps/*/package.json' 2>/dev/null | xargs); do
            if [ -f "$pkg" ]; then
              name=$(grep '"name"' "$pkg" | head -1 | sed 's/.*"@strawberrybear\/\([^"]*\)".*/\1/')
              version=$(grep '"version"' "$pkg" | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
              echo "Package: @strawberrybear/$name v$version"
            fi
          done

      - name: Create GitHub Release
        if: steps.changeset.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
