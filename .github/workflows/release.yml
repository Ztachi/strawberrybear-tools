name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run changeset version
        id: changeset
        run: |
          echo "Running changeset version..."
          pnpm ci:version
          CHANGESET_SUMMARY=$(git status --porcelain)
          echo "Changeset summary: $CHANGESET_SUMMARY"
          if [ -n "$CHANGESET_SUMMARY" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push version bump
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          echo "Committing version bump..."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: version bump"
          git push

      - name: Get package info and create release
        if: steps.changeset.outputs.has_changes == 'true'
        id: release_info
        run: |
          # Get the first changed package (for multi-package, creates multiple releases)
          PKG_FILE=$(git diff HEAD~1 --name-only -- 'apps/*/package.json' 2>/dev/null | head -1)
          if [ -n "$PKG_FILE" ] && [ -f "$PKG_FILE" ]; then
            PKG_NAME=$(grep '"name"' "$PKG_FILE" | head -1 | sed 's/.*"@strawberrybear\/\([^"]*\)".*/\1/')
            PKG_VERSION=$(grep '"version"' "$PKG_FILE" | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
            TAG_NAME="${PKG_NAME}@${PKG_VERSION}"
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "body_file=apps/${PKG_NAME}/CHANGELOG.md" >> $GITHUB_OUTPUT
            echo "Created release for $TAG_NAME"
          else
            echo "No package changes found"
            echo "has_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.release_info.outputs.has_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.tag_name }}
          body_path: ${{ steps.release_info.outputs.body_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create additional releases for multi-package
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          # Check if there are more packages that need releases
          CHANGED_PKGS=$(git diff HEAD~1 --name-only -- 'apps/*/package.json' 2>/dev/null | tail -n +2)
          if [ -n "$CHANGED_PKGS" ]; then
            echo "Creating releases for additional packages..."
            for PKG_FILE in $CHANGED_PKGS; do
              if [ -f "$PKG_FILE" ]; then
                PKG_NAME=$(grep '"name"' "$PKG_FILE" | head -1 | sed 's/.*"@strawberrybear\/\([^"]*\)".*/\1/')
                PKG_VERSION=$(grep '"version"' "$PKG_FILE" | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
                TAG_NAME="${PKG_NAME}@${PKG_VERSION}"
                CHANGELOG_FILE="apps/${PKG_NAME}/CHANGELOG.md"
                
                echo "Creating release for $TAG_NAME"
                
                # Create release using GitHub CLI
                if [ -f "$CHANGELOG_FILE" ]; then
                  BODY=$(cat "$CHANGELOG_FILE")
                else
                  BODY="Release $TAG_NAME"
                fi
                
                gh release create "$TAG_NAME" \
                  --title "$TAG_NAME" \
                  --notes "$BODY" \
                  --draft=false \
                  --prerelease=false \
                  || echo "Release $TAG_NAME may already exist"
              fi
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
