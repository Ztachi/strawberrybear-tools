name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run changeset version
        id: changeset
        run: |
          pnpm ci:version
          CHANGESET_SUMMARY=$(git status --porcelain)
          if [ -n "$CHANGESET_SUMMARY" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push version bump
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: version bump"
          git push

      - name: Fetch latest commit
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Get changed packages
        id: changed_packages
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          echo "Finding changed packages..."
          git diff --name-only HEAD~1 -- 'apps/*/package.json' > /tmp/changed_packages.txt
          cat /tmp/changed_packages.txt
          echo "packages_file=/tmp/changed_packages.txt" >> $GITHUB_OUTPUT

      - name: Build all changed packages
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          for pkg_file in $(cat ${{ steps.changed_packages.outputs.packages_file }}); do
            pkg_dir=$(dirname "$pkg_file")
            echo "Building $pkg_dir..."
            cd "$pkg_dir"
            pnpm build
            cd - > /dev/null
          done

      - name: Create release for each changed package
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          echo "Creating releases..."
          
          # Loop through changed packages
          while IFS= read -r pkg_file; do
            if [ -f "$pkg_file" ]; then
              pkg_dir=$(dirname "$pkg_file")
              pkg_name=$(grep '"name"' "$pkg_file" | head -1 | sed 's/.*"@strawberrybear\/\([^"]*\)".*/\1/')
              pkg_version=$(grep '"version"' "$pkg_file" | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
              TAG_NAME="${pkg_name}@${pkg_version}"
              CHANGELOG_FILE="apps/${pkg_name}/CHANGELOG.md"
              
              echo "Processing: $TAG_NAME"
              
              # Read changelog
              if [ -f "$CHANGELOG_FILE" ]; then
                BODY=$(cat "$CHANGELOG_FILE")
              else
                BODY="Release $TAG_NAME"
              fi
              
              # Check for dist
              if [ -d "$pkg_dir/dist" ]; then
                echo "Creating archive for $pkg_name..."
                cd "$pkg_dir"
                tar -czf "${pkg_name}-${pkg_version}.tar.gz" dist/
                ARCHIVE="${pkg_name}-${pkg_version}.tar.gz"
                cd - > /dev/null
                
                echo "Creating release with archive: $ARCHIVE"
                gh release create "$TAG_NAME" \
                  --title "$TAG_NAME" \
                  --notes "$BODY" \
                  --draft=false \
                  --prerelease=false \
                  "$pkg_dir/$ARCHIVE"
              else
                echo "No dist found, creating release without artifact"
                gh release create "$TAG_NAME" \
                  --title "$TAG_NAME" \
                  --notes "$BODY" \
                  --draft=false \
                  --prerelease=false
              fi
              
              echo "Created: $TAG_NAME"
            fi
          done < "${{ steps.changed_packages.outputs.packages_file }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
