name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run changeset version
        id: changeset
        run: |
          echo "Running changeset version..."
          pnpm ci:version
          CHANGESET_SUMMARY=$(git status --porcelain)
          echo "Changeset summary: $CHANGESET_SUMMARY"
          if [ -n "$CHANGESET_SUMMARY" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push version bump
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          echo "Committing version bump..."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: version bump"
          git push

      - name: Fetch latest to get pushed commit
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Get changed packages
        id: changed_packages
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          CHANGED_PKGS=$(git diff --name-only HEAD~1 -- 'apps/*/package.json' 2>/dev/null)
          echo "Changed packages: $CHANGED_PKGS"
          echo "$CHANGED_PKGS" | tr ' ' '\n' > /tmp/changed_packages.txt
          echo "packages_file=/tmp/changed_packages.txt" >> $GITHUB_OUTPUT

      - name: Build changed packages
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          echo "Building changed packages..."
          # Get package names and build each one
          for pkg_file in $(cat ${{ steps.changed_packages.outputs.packages_file }}); do
            pkg_dir=$(dirname "$pkg_file")
            echo "Building $pkg_dir..."
            cd "$pkg_dir"
            pnpm build
            cd - > /dev/null
          done

      - name: Upload build artifacts
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          echo "Uploading build artifacts..."
          for pkg_file in $(cat ${{ steps.changed_packages.outputs.packages_file }}); do
            pkg_dir=$(dirname "$pkg_file")
            pkg_name=$(grep '"name"' "$pkg_file" | head -1 | sed 's/.*"@strawberrybear\/\([^"]*\)".*/\1/')
            pkg_version=$(grep '"version"' "$pkg_file" | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
            
            echo "Processing $pkg_name v$pkg_version..."
            
            # Check for dist directory
            if [ -d "$pkg_dir/dist" ]; then
              echo "Found dist for $pkg_name, creating archive..."
              cd "$pkg_dir"
              
              # Create zip of dist
              zip -r "${pkg_name}-${pkg_version}.zip" dist/ 2>/dev/null || tar -czf "${pkg_name}-${pkg_version}.tar.gz" dist/
              
              if [ -f "${pkg_name}-${pkg_version}.zip" ]; then
                ARCHIVE="${pkg_name}-${pkg_version}.zip"
              else
                ARCHIVE="${pkg_name}-${pkg_version}.tar.gz"
              fi
              
              echo "Created archive: $ARCHIVE"
              cd - > /dev/null
            else
              echo "No dist found for $pkg_name"
            fi
          done

      - name: Get package info and create release
        if: steps.changeset.outputs.has_changes == 'true'
        id: release_info
        run: |
          CHANGED_PKGS=$(cat ${{ steps.changed_packages.outputs.packages_file }})
          echo "Creating releases for: $CHANGED_PKGS"
          
          for PKG_FILE in $CHANGED_PKGS; do
            if [ -f "$PKG_FILE" ]; then
              PKG_NAME=$(grep '"name"' "$PKG_FILE" | head -1 | sed 's/.*"@strawberrybear\/\([^"]*\)".*/\1/')
              PKG_VERSION=$(grep '"version"' "$PKG_FILE" | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
              TAG_NAME="${PKG_NAME}@${PKG_VERSION}"
              CHANGELOG_FILE="apps/${PKG_NAME}/CHANGELOG.md"
              
              echo "---"
              echo "Creating release for: $TAG_NAME"
              
              # Read changelog content
              if [ -f "$CHANGELOG_FILE" ]; then
                BODY=$(cat "$CHANGELOG_FILE")
              else
                BODY="Release $TAG_NAME"
              fi
              
              # Prepare assets
              ASSETS=""
              ARCHIVE=""
              if [ -d "apps/${PKG_NAME}/dist" ]; then
                cd "apps/${PKG_NAME}"
                if [ -f "${PKG_NAME}-${PKG_VERSION}.zip" ]; then
                  ASSETS="${PKG_NAME}-${PKG_VERSION}.zip"
                elif [ -f "${PKG_NAME}-${PKG_VERSION}.tar.gz" ]; then
                  ASSETS="${PKG_NAME}-${PKG_VERSION}.tar.gz"
                fi
                cd - > /dev/null
              fi
              
              echo "Assets to upload: $ASSETS"
              
              # Create release with gh CLI
              if [ -n "$ASSETS" ] && [ -f "$ASSETS" ]; then
                gh release create "$TAG_NAME" \
                  --title "$TAG_NAME" \
                  --notes "$BODY" \
                  --draft=false \
                  --prerelease=false \
                  --latest=true \
                  "$ASSETS"
              else
                gh release create "$TAG_NAME" \
                  --title "$TAG_NAME" \
                  --notes "$BODY" \
                  --draft=false \
                  --prerelease=false \
                  --latest=true
              fi
              
              echo "Release $TAG_NAME created successfully"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
