name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run changeset version
        id: changeset
        run: |
          echo "Running changeset version..."
          pnpm ci:version
          CHANGESET_SUMMARY=$(git status --porcelain)
          echo "Changeset summary: $CHANGESET_SUMMARY"
          if [ -n "$CHANGESET_SUMMARY" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push version bump
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          echo "Committing version bump..."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: version bump"
          git push

      - name: Fetch latest to get pushed commit
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Get package info and create release
        if: steps.changeset.outputs.has_changes == 'true'
        id: release_info
        run: |
          # Get list of changed packages
          echo "Finding changed packages..."
          CHANGED_PKGS=$(git diff --name-only HEAD~1 -- 'apps/*/package.json' 2>/dev/null)
          echo "Changed packages: $CHANGED_PKGS"
          
          # Create releases for each changed package
          for PKG_FILE in $CHANGED_PKGS; do
            if [ -f "$PKG_FILE" ]; then
              PKG_NAME=$(grep '"name"' "$PKG_FILE" | head -1 | sed 's/.*"@strawberrybear\/\([^"]*\)".*/\1/')
              PKG_VERSION=$(grep '"version"' "$PKG_FILE" | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
              TAG_NAME="${PKG_NAME}@${PKG_VERSION}"
              CHANGELOG_FILE="apps/${PKG_NAME}/CHANGELOG.md"
              
              echo "---"
              echo "Creating release for: $TAG_NAME"
              
              # Read changelog content
              if [ -f "$CHANGELOG_FILE" ]; then
                BODY=$(cat "$CHANGELOG_FILE")
                echo "Changelog length: ${#BODY} chars"
              else
                BODY="Release $TAG_NAME"
              fi
              
              # Create release using GitHub CLI
              gh release create "$TAG_NAME" \
                --title "$TAG_NAME" \
                --notes "$BODY" \
                --draft=false \
                --prerelease=false
              
              echo "Release $TAG_NAME created successfully"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
