name: 'Release: infinity-nikki-player'

on:
  push:
    branches:
      - main
    paths:
      - 'apps/infinity-nikki-player/**'
      - '!apps/infinity-nikki-player/**/*.md'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 单独构建 Tauri 应用
  build-tauri:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--bundles dmg'
            artifact_path: 'apps/infinity-nikki-player/src-tauri/target/release/bundle/dmg'
          - os: windows-latest
            args: '--bundles nsis'
            artifact_path: 'apps/infinity-nikki-player/src-tauri/target/release/bundle/nsis'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm --filter @strawberrybear/infinity-nikki-player tauri build ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: infinity-nikki-player-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 3

  # 版本管理和发布
  release:
    needs: build-tauri
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run changeset version
        id: changeset
        run: |
          pnpm ci:version
          CHANGESET_SUMMARY=$(git status --porcelain)
          if [ -n "$CHANGESET_SUMMARY" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip release (no changeset)
        if: steps.changeset.outputs.has_changes != 'true'
        run: 'echo "Skip release: no changeset version change detected"'

      - name: Commit and push version bump
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: version bump"
          git push

      - name: Fetch latest commit
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Get app version
        id: version
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          VERSION=$(grep '"version"' apps/infinity-nikki-player/package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get changelog entry
        id: changelog
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CONTENT=$(awk "/^## ${VERSION}/{flag=1; next} /^## [0-9]/{if(flag) exit} flag" apps/infinity-nikki-player/CHANGELOG.md)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 下载 artifacts（移除 has_changes 条件，始终下载）
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: infinity-nikki-player-macos-latest
          path: ./macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: infinity-nikki-player-windows-latest
          path: ./windows

      - name: List artifacts
        run: |
          ls -la ./macos/
          ls -la ./windows/

      - name: Create Release
        if: steps.changeset.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: false
          tag_name: infinity-nikki-player@v${{ steps.version.outputs.version }}
          name: infinity-nikki-player@v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          files: |
            ./macos/*.dmg
            ./windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
