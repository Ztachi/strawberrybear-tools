name: 'Release: universe-explorer'

on:
  push:
    branches:
      - main
    paths:
      - 'apps/universe-explorer/**'
      - '!apps/universe-explorer/**/*.md'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LC_ALL: C.UTF-8
  LANG: en_US.UTF-8

jobs:
  deploy-pages:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @strawberrybear/universe-explorer build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy apps/universe-explorer/dist --project-name=universe-explorer --branch=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @strawberrybear/universe-explorer build

      - name: Run changeset version
        id: changeset
        run: |
          pnpm ci:version
          CHANGESET_SUMMARY=$(git status --porcelain)
          if [ -n "$CHANGESET_SUMMARY" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip release (no changeset)
        if: steps.changeset.outputs.has_changes != 'true'
        run: 'echo "Skip release: no changeset version change detected"'

      - name: Package dist
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          cd apps/universe-explorer
          zip -r ../../universe-explorer-dist.zip dist/

      - name: Commit and push version bump
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/ .changeset/
          git commit -m "chore: version bump"
          git push

      - name: Fetch latest commit
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Get app version
        id: version
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          VERSION=$(grep '"version"' apps/universe-explorer/package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get changelog entry
        id: changelog
        if: steps.changeset.outputs.has_changes == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CONTENT=$(awk "/^## ${VERSION}/{flag=1; next} /^## [0-9]/{if(flag) exit} flag" apps/universe-explorer/CHANGELOG.md)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.changeset.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: false
          tag_name: universe-explorer@v${{ steps.version.outputs.version }}
          name: universe-explorer@v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          files: universe-explorer-dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
