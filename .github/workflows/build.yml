name: 'Build Release'

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_COLOR: 1

jobs:
  build-tauri:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target aarch64-apple-darwin --bundles dmg'
            artifact_path: 'apps/infinity-nikki-player/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg'
          - os: windows-latest
            args: '--bundles nsis'
            artifact_path: 'apps/infinity-nikki-player/src-tauri/target/release/bundle/nsis'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm --filter @strawberrybear/infinity-nikki-player tauri build ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: infinity-nikki-player-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
