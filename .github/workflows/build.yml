name: 'Build Release'

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_COLOR: 1

jobs:
  build-tauri:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--bundles dmg'
            artifact_path: 'apps/infinity-nikki-player/src-tauri/target/release/bundle/dmg'
          - os: windows-latest
            args: '--bundles nsis'
            artifact_path: 'apps/infinity-nikki-player/src-tauri/target/release/bundle/nsis'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm --filter @strawberrybear/infinity-nikki-player tauri build ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: infinity-nikki-player-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    needs: build-tauri
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: infinity-nikki-player-macos-latest
          path: ./macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: infinity-nikki-player-windows-latest
          path: ./windows

      - name: List artifacts
        run: |
          ls -la ./macos/
          ls -la ./windows/

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep '"version"' apps/infinity-nikki-player/package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          tag_name: infinity-nikki-player@v${{ steps.version.outputs.version }}
          release_name: InfinityNikkiPlayer v${{ steps.version.outputs.version }}
          body: |
            ## 安装说明

            ### macOS
            1. 下载 `.dmg` 文件
            2. 打开 DMG，将 **InfinityNikkiPlayer.app** 拖入 Applications 文件夹
            3. 首次打开时如果提示"无法验证开发者"：
               - 前往 **系统设置 → 隐私与安全性**
               - 滚动到底部，点击 **"仍要打开"**

            ### Windows
            下载 `.exe` 安装包，双击运行即可。
          assets: |
            ./macos/*.dmg
            ./windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
